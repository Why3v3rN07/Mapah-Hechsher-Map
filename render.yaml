services:
  - type: web
    name: mapah-backend
    runtime: python
    rootDir: mapah-backend
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /api/csrf-token
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      # Set DATABASE_URL and secrets in Render dashboard or env groups.
      - key: HECHSHER_UPLOAD_DIR
        value: /var/data/hechshers
    disk:
      name: mapah-data
      mountPath: /var/data
      sizeGB: 1

